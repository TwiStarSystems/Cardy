# Cardy — Example edge reverse proxy (TLS terminator)
#
# Use this on the FRONT Nginx instance. It proxies traffic to a backend
# Cardy server running cardy.conf on port 80.
#
# Replace:
#   cardy.example.com  -> your public hostname
#   10.0.0.20          -> backend Cardy server IP/hostname

upstream cardy_backend {
    server 10.0.0.20:80;
    keepalive 32;
}

server {
    listen 80;
    server_name cardy.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cardy.example.com;

    ssl_certificate     /etc/letsencrypt/live/cardy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cardy.example.com/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # DAV sync/import requests can be large and long-running.
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_redirect off;
        proxy_pass http://cardy_backend;
    }
}
