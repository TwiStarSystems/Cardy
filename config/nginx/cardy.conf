# Cardy — Unified Web UI + CardDAV/CalDAV Service
# Served on port 80.
#
# Paths exposed:
#   /               — Web UI
#   /principals/    — DAVACL principals
#   /addressbooks/  — CardDAV address books
#   /calendars/     — CalDAV calendars
#
# Copy this file to /etc/nginx/sites-available/cardy
# and create a symlink in /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    server_name _;

    root /var/www/cardy/public;
    index webui/index.php;

    access_log /var/log/nginx/cardy-access.log;
    error_log  /var/log/nginx/cardy-error.log;

    # Allow large calendar/vCard uploads (e.g. photos)
    client_max_body_size 16M;

    # Discoverability endpoints used by many DAV clients
    location = /.well-known/carddav {
        return 301 /addressbooks/;
    }

    location = /.well-known/caldav {
        return 301 /calendars/;
    }

    # Web UI static assets
    location /assets/ {
        alias /var/www/cardy/public/webui/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # DAV routes
    location ^~ /principals/ {
        try_files $uri /dav/index.php$is_args$args;
    }

    location ^~ /addressbooks/ {
        try_files $uri /dav/index.php$is_args$args;
    }

    location ^~ /calendars/ {
        try_files $uri /dav/index.php$is_args$args;
    }

    # Route all other paths to the Web UI entry point
    location / {
        try_files $uri $uri/ /webui/index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Forward proxy headers to PHP for trusted proxy handling
        fastcgi_param  HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param  HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param  HTTP_X_REAL_IP         $http_x_real_ip;

        # Pass the original request method (PROPFIND, REPORT, etc.)
        fastcgi_param  REQUEST_METHOD  $request_method;

        # Increase timeout for large syncs
        fastcgi_read_timeout 300;
    }
}
