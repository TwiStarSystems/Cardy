# Cardy — Web UI
# Served on port 8321 (HTTP, designed to run behind a reverse proxy).
#
# Copy this file to /etc/nginx/sites-available/cardy-webui
# and create a symlink in /etc/nginx/sites-enabled/

server {
    listen 8321;
    server_name _;

    root /var/www/cardy/webui;
    index index.php;

    access_log /var/log/nginx/cardy-webui-access.log;
    error_log  /var/log/nginx/cardy-webui-error.log;

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # Static assets — serve directly with cache headers
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Route all requests to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }
}
