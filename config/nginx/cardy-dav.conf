# Cardy — CardDAV / CalDAV Service
# Served on port 80 (standard HTTP port for DAV protocols).
#
# Paths exposed:
#   /principals/    — DAVACL principals
#   /addressbooks/  — CardDAV address books
#   /calendars/     — CalDAV calendars
#
# Copy this file to /etc/nginx/sites-available/cardy-dav
# and create a symlink in /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    server_name _;

    root /var/www/cardy/dav;
    index index.php;

    access_log /var/log/nginx/cardy-dav-access.log;
    error_log  /var/log/nginx/cardy-dav-error.log;

    # Allow large calendar/vCard uploads (e.g. photos)
    client_max_body_size 16M;

    # CardDAV / CalDAV require proper WebDAV method support
    # Allow all standard WebDAV methods
    dav_methods     off;   # handled by PHP/SabreDAV

    # Route all requests to the DAV entry point
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Pass the original request method (PROPFIND, REPORT, etc.)
        fastcgi_param  REQUEST_METHOD  $request_method;

        # Increase timeout for large syncs
        fastcgi_read_timeout 300;
    }
}
